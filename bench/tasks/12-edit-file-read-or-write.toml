# Bench fixture format — see bench/README.md for the schema reference.
#
# Second positive guard-fire fixture in the suite (after 11). Baits
# `read_before_write` on `edit_file` with a naturally underspecified
# prompt and captures the post-(b) auto-read recovery shape.
#
# Evolution of this fixture across three landings (all 2026-05-17):
#
#   1) Original commit pinned the 0/3 recovery shape — model emitted
#      edit_file, guard refused, model apologized-and-stopped.
#   2) `guard_failure_memory_note` wired into the read_before_write
#      `continue` branch lifted recovery to 3/3 on the FIRST hop only:
#      model performs read_file but stops before composing edit_file,
#      hitting `neo-llm-bench`'s 0% BFCL multi-turn floor for the
#      tool-result-to-different-tool transition.
#   3) Auto-read on guard refusal (lessons.md 2026-05-17 third entry,
#      option (b)) collapses the two-hop chain into a single hop at the
#      harness layer. When the guard fires, the harness performs a
#      bounded read_file ITSELF and surfaces the content to the model
#      as a system note. The model's next turn observes the content
#      already in scope and only needs to emit edit_file — the single
#      hop the model CAN sustain.
#
# This fixture now pins the AUTO-READ shape:
#   - 2 dispatched tool calls per rep (1 synthetic read_file from the
#     harness + 1 model-emitted edit_file)
#   - read_before_write guard fires exactly once
#   - Exactly one synthetic call, kind read_file
#   - FinalAnswer, edit succeeds
#
# Measurement from the (b) shape-check run (2026-05-17, reps=3):
#   - 4480 total tokens (bit-identical across reps)
#   - 4.8-11s wall (vs (a) probe's 14-34s, ~3x improvement)
#   - 3/3 task success (vs (a) probe's 7/10, vs Commit-E's 0/3 second hop)
#
# Predicate-flip provenance:
#   Pre-(b) anchor lives at `bench/archive/12-edit-file-read-or-write-
#   pre-auto-read.toml` — running it against the current harness will
#   intentionally fail (the shape it pins no longer holds), and that's
#   the contract: if the auto-read is ever disabled or regressed, the
#   archive fixture flips green and signals the gap.

id = "12-edit-file-read-or-write"
description = "Bait `read_before_write` for `edit_file`. With auto-read landed (option b), the harness synthesizes the recovery read_file; the model only needs to emit the final edit_file. Locks the synthetic-read + model-edit shape."
prompt = "Change 'foo' to 'bar' in notes.txt."
cwd_isolated = true

# Single "foo" occurrence: edit_file's unique-match enforcement passes
# without needing replace_all=true.
[[seed_files]]
path = "notes.txt"
content = "line one with foo in it\nline two without it\n"

[expect]
stop_reason = "FinalAnswer"

# Exactly two dispatched calls: the synthetic read_file emitted by the
# harness as part of auto-read recovery, and the model's edit_file. A
# third call would mean the model is doing extra work — typically a
# redundant read on top of the harness's auto-read — and that's a
# regression signal. The count-based predicate is robust to provenance:
# a redundant model `read_file` would bump tool_calls to 3 and fail.
min_tool_calls = 2
max_tool_calls = 2
must_call_all_of = ["edit_file", "read_file"]
must_not_call = ["list_dir", "list_files_recursive", "grep",
                 "write_file", "bash"]

# Provenance-aware predicates (schema v3). The read_file MUST be
# synthetic (i.e., emitted by the harness's auto-read). If a future
# regression causes the model to emit read_file directly while the
# harness's synthesis is disabled, `must_have_synthetic_calls` flips
# RED and that's the signal. Defensive: assert nothing mutating is
# ever synthesized — a synthetic edit_file/write_file would be a
# correctness bug.
must_have_synthetic_calls = ["read_file"]
must_not_have_synthetic_calls = ["edit_file", "write_file"]

# Positive guard fire — load-bearing assertion. Exactly one fire,
# kind=read_before_write. The other guards stay silent (canary set).
must_fire_guards = ["read_before_write"]
must_not_fire_guards = ["cold_read", "dedup", "length", "write_pressure",
                        "turn_cap"]
min_guard_fires = 1
max_guard_fires = 1

# Guard refusals push a note as a tool_result with ok=true (not an
# error). The synthetic auto-read also succeeds. The model's edit_file
# succeeds. No tool_errors.
min_tool_errors = 0
max_tool_errors = 0

# Observed wall_ms across 3 reps at the (b) shape-check: 4801, 7924,
# 10959. The 10959 outlier reflects cold-cache state on the first rep
# after server start (documented in lessons.md 2026-05-15); 15000 gives
# ~4 s headroom over the worst observed.
max_wall_ms = 15000
# Architectural floor at temp=0, measured 2026-05-17 across 3 reps
# post-(b): 4480 total tokens bit-identical. 5000 gives ~520 tokens of
# headroom, matching the standing "measured floor + ~10% headroom"
# convention (the looser convention used by 03 doesn't apply here
# because (b) eliminates the spurious-chain-of-reasoning variance).
max_total_tokens = 5000
