# Bench fixture format — see bench/README.md for the schema reference.
#
# Category: GUARD-INTERVENTION CHARACTERIZATION (not task-success
# deterministic). This fixture's job is to lock the auto-read contract
# and the harness's behavior across the multi-shape envelope the 1.5 B
# model produces on the BFCL multi-turn floor — NOT to assert that a
# specific deterministic task completion shape holds every rep.
#
# Distinguishes from task-success fixtures (01-08, 11) where the
# predicates pin a single deterministic shape. Phase-B framing per
# Reviewer 3, 2026-05-17.
#
# Arc of the fixture across four landings (all 2026-05-17):
#
#   1) Initial commit pinned 0/3 second-hop recovery — model edits
#      blindly, guard refuses, model apologizes-and-stops.
#   2) `guard_failure_memory_note` wired into the read_before_write
#      `continue` branch lifted recovery to 3/3 first-hop only:
#      model reads, then stops before composing edit_file.
#   3) Auto-read on guard refusal (option b) — harness performs the
#      bounded read itself. Three delivery shapes tried in sequence:
#       - b-current (system note delivery): 40% task success at scale
#         (10/30 in stress; the original 3/3 baseline was a warm-cache
#         outlier).
#       - b-toolresult (synthetic tool_call/tool_result pair): 87%
#         task success across 30 stress reps with 4 distinct
#         deterministic shapes — clean (47%), verify-read (40%),
#         length-truncated (10%), no-call-FA (3%).
#       - Phase-C prompt-rule probe (negative-general anti-prose-shell):
#         eliminated bash-loop AND verify-read shapes but redistributed
#         failure mass into no-call-FA (3% → 40%). Net 6/10. Reverted.
#   4) This fixture lands as a GUARD-INTERVENTION CHARACTERIZATION
#      fixture: codifies the b-toolresult envelope with
#      compositionality preserved via `min_model_tool_calls = 1`,
#      rejecting the no-call-FA and length-truncated shapes where the
#      auto-read fired but the model emitted nothing. Bash stays
#      forbidden — real bash-tool dispatch is a different failure
#      class than the prose-bash blocks the model writes when stuck.
#
# Stress envelope persisted at:
#   bench/baselines/main/12-stress-envelope.json
#
# Pre-(b) regression canary lives at:
#   bench/archive/12-edit-file-read-or-write-pre-auto-read.toml
#
# Full narrative in lessons.md 2026-05-17 (fourth entry).

id = "12-edit-file-read-or-write"
description = "Bait `read_before_write` for `edit_file`. Locks the guard-intervention shape: synth read_file fires, model composes at least one tool call beyond the synthetic read. Admits the verify-read variant; rejects the no-call-FA and length-truncated shapes via min_model_tool_calls=1."
prompt = "Change 'foo' to 'bar' in notes.txt."
cwd_isolated = true

[[seed_files]]
path = "notes.txt"
content = "line one with foo in it\nline two without it\n"

[expect]
# stop_reason intentionally omitted — both FinalAnswer and Length are
# observable in the envelope. The compositionality predicate below
# (min_model_tool_calls=1) is the load-bearing rejection for the
# Length-truncated and no-call-FA shapes, not the stop_reason axis.

# Total tool_calls: synthetic read_file (1) + model call(s) (≥1).
# The verify-read shape sees 3 tool_calls (synth read + edit + verify);
# the clean shape sees 2 (synth read + edit). 4+ would mean the model
# is doing extra work — regression signal.
min_tool_calls = 2
max_tool_calls = 3
must_call_any_of = ["edit_file"]

# Compositionality contract — load-bearing predicate. Without this, the
# no-call-FA shape (synthetic read fires, model emits no tool call,
# stops with FinalAnswer) trivially passes `must_have_synthetic_calls`
# and the fixture would drift from "the recovery path works" to "the
# recovery path emitted a synthetic read." See Reviewer 3 critique
# 2026-05-17.
min_model_tool_calls = 1

# Bash stays forbidden. Real bash-tool dispatch is a different failure
# class than the prose-bash code-block loops the model writes when
# unable to compose edit_file (those don't dispatch bash; they emit
# markdown text that hits max_tokens). If a future regression unlocks
# real bash-tool calls on this fixture, that's a distinct signal we
# want to catch, not normalize into the envelope.
must_not_call = ["list_dir", "list_files_recursive", "grep",
                 "write_file", "bash"]

# Provenance contract — invariant across all observed shapes.
must_have_synthetic_calls = ["read_file"]
must_not_have_synthetic_calls = ["edit_file", "write_file"]

# Guard fires: read_before_write is the load-bearing fire. length is
# admitted as part of the envelope but not asserted — it appears in
# ~10% of cold-server reps when the model goes into a prose-bash loop
# after the synthetic read. Other guard kinds stay locked out as a
# canary set; their accidental appearance would indicate a separate
# bug, not this fixture's failure family.
must_fire_guards = ["read_before_write"]
must_not_fire_guards = ["cold_read", "dedup", "write_pressure", "turn_cap"]
min_guard_fires = 1
# Upper bound admits the length-truncated shape (rbw + length = 2
# fires). Length-truncated reps also fail min_model_tool_calls=1, so
# this max only matters as a defensive ceiling.
max_guard_fires = 2

# Tool errors: guard refusals push tool_results with ok=true (refusal
# notes, not errors). Synthetic auto-read succeeds. Model's recovery
# edit_file succeeds. No tool_errors in any observed shape.
min_tool_errors = 0
max_tool_errors = 0

# Envelope caps. Measured across 30 stress reps:
#   clean shape:   4276-4314 tokens
#   verify shape:  6299-6355 tokens
#   length-trunc:  ~4400-4500 tokens (compl_tok=2048 + prompt overhead)
#   no-call-FA:    ~2900-3000 tokens
# 7000 token cap admits all four shapes with ~650 token headroom over
# the verify-shape ceiling.
max_total_tokens = 7000

# Wall envelope:
#   clean shape:   3-12s
#   verify shape:  9-15s
#   length-trunc:  60-70s (model burns through max_tokens=2048 generating
#                  bash code blocks at slow throughput on older Metal rigs)
#   no-call-FA:    5-10s
# 75000ms cap admits all four shapes with margin. CI runner noise may
# require structural intervention (lower max_tokens per turn) if this
# cap proves brittle in practice — see lessons.md watchout 5.
max_wall_ms = 75000
