id = "03-decline-irrelevant"
description = "Over-call resistance: a math question that needs no tools."
prompt = "What is 17 + 25?"

[expect]
stop_reason = "FinalAnswer"
# The model still emits a read_file tool_call on this prompt at temp=0.
# The first-turn cold-read guard (src/agent/guards.rs::first_turn_cold_read_check)
# intercepts it before dispatch — so `tool_calls` in the trace stays at 0.
# That's a successful harness-layer mitigation of a prompt-layer failure.
min_tool_calls = 0
max_tool_calls = 0
must_not_call = ["read_file", "list_dir", "list_files_recursive", "grep",
                 "write_file", "edit_file", "bash"]
# Lock the cold_read guard fire that makes `max_tool_calls=0` possible.
# Without the guard, the model dispatches read_file(/dev/null) (see
# `lessons.md` 2026-05-15) and the tool-count predicate would fail.
# Promoting the guard fire to a positive assertion turns this fixture into
# a regression test for `first_turn_cold_read_check` itself, not just its
# downstream effect on tool_calls. Baseline reps 0/1/2 all show exactly
# one cold_read fire — locking min=max=1.
must_fire_guards = ["cold_read"]
min_guard_fires = 1
max_guard_fires = 1
max_wall_ms = 15000
# Architectural floor with the cold-read guard: ~2200 tokens.
#   - turn 0 prompt (system + 7 tool defs + user): ~1070
#   - turn 0 assistant tool_call (refused by guard): ~25
#   - turn 1 prompt (history + refusal stub): ~1140
#   - turn 1 final answer "17 + 25 is 42.": ~12
# 2500 gives ~300 tokens of headroom for the next prompt/tool-def rev.
# Measured 2026-05-15 post-guard: 2247 across 3 reps (deterministic).
max_total_tokens = 2500

[expect.must_contain]
# Final answer must contain "42" — substring match, case-insensitive.
text = "42"
