id = "sample-trace"
description = "Reference trace shipped with the repo for CI / replay docs."
prompt = "Read README.md and summarize it."

[expect]
stop_reason = "FinalAnswer"
min_tool_calls = 1
max_tool_calls = 3
must_call_any_of = ["read_file"]
must_not_call = ["write_file", "edit_file", "bash"]
max_wall_ms = 5000
max_total_tokens = 2000

# Exercises the schema-v2 final_answer round-trip: the predicate must pass
# from `bench-replay` alone (no subprocess capture).
[expect.must_contain]
text = "micro-mind"
