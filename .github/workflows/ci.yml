name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: cargo test + replay
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: Format check
        run: cargo fmt --all -- --check
      # Clippy gates the build at zero warnings. The floor is currently
      # clean; if you legitimately need an exception, add `#[allow(...)]`
      # at the narrowest scope rather than relaxing this step.
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Build
        run: cargo build --all-targets
      - name: Unit tests
        run: cargo test --all-targets
      - name: Schema check of sample trace
        run: cargo run --bin bench-replay -- --trace bench/samples/sample-trace.jsonl --schema-only
      - name: Replay sample trace against fixture
        run: cargo run --bin bench-replay -- --fixture bench/samples/sample-fixture.toml --trace bench/samples/sample-trace.jsonl
      - name: Summarize sample trace
        run: cargo run --bin bench-summarize -- --md bench/samples/sample-trace.jsonl
      # Schema-migration check — GATES the build. Every committed JSONL
      # trace (archive + main) must (a) parse under the current schema
      # without errors and (b) produce a Summary whose model/synthetic
      # tool-call accounting is internally consistent. This is the
      # hermetic deserialization contract — distinct from the semantic
      # replay below, which checks predicate evaluation against fixtures
      # (and is advisory for the archive baselines whose fixtures have
      # moved). See `obs/schema.md` v3 "Replay invariants" and
      # `bench/PREDICATES.md` for the pinned-vs-not-pinned surface.
      - name: Schema migration check (gating — archive + main parse cleanly)
        run: cargo run --bin bench-replay -- --migration-check bench/baselines
      # Canonical baseline replay — GATES the build. The committed traces
      # under bench/baselines/main/ must satisfy every fixture predicate.
      # When you re-capture (bench-run … --out bench/baselines/main), commit
      # the new traces; if predicates regress, this step fails the build.
      - name: Replay canonical baseline (gating)
        run: cargo run --bin bench-replay -- --all bench/tasks --runs bench/baselines/main
      # Archive baselines — historical reference; predicates may have moved
      # since they were captured. Advisory only.
      - name: Replay archive baselines (advisory)
        continue-on-error: true
        run: |
          shopt -s nullglob
          found_any=0
          for runs_dir in bench/baselines/archive/*/; do
            jsonls=( "$runs_dir"*.jsonl )
            if [ ${#jsonls[@]} -eq 0 ]; then continue; fi
            found_any=1
            echo "::group::replay $runs_dir"
            cargo run --bin bench-replay -- --all bench/tasks --runs "$runs_dir" || exit 1
            echo "::endgroup::"
          done
          if [ "$found_any" = "0" ]; then
            echo "(no archive baselines committed)"
          fi
